# Copy to <your-project>/.github/workflows/supabase-backup-verify.yml
name: Supabase Backup Verify (weekly)

on:
  schedule:
    - cron: "0 7 * * 6"   # 07:00 UTC every Saturday (edit to change the day/time)
  workflow_dispatch:

permissions:
  contents: read
  actions: read           # to list/download a previous run's artifact

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: verify
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - name: Find latest backup artifact
        id: find
        uses: actions/github-script@v7
        env:
          PREFIX: ${{ vars.BACKUP_PREFIX || 'my-project' }}   # <-- must match backup_prefix
        with:
          script: |
            const prefix = process.env.PREFIX;
            const arts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner: context.repo.owner, repo: context.repo.repo, per_page: 100 }
            );
            const latest = arts
              .filter(a => a.name.startsWith(prefix) && !a.expired)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];
            if (!latest) { core.setFailed('No backup artifact found'); return; }
            core.setOutput('name', latest.name);
            core.setOutput('run_id', latest.workflow_run.id);

      - name: Download it
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.find.outputs.name }}
          run-id: ${{ steps.find.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./verify-in

      - uses: alessonviana/supabase-backup-kit/verify@v1
        with:
          backup_file:     ./verify-in/${{ steps.find.outputs.name }}
          age_identity:    ${{ secrets.AGE_SECRET_KEY }}
          pg_url:          postgresql://postgres:postgres@localhost:5432/verify
          # Driven by repository Variables, with defaults if unset.
          expected_tables: ${{ vars.VERIFY_EXPECTED_TABLES || 'sales products' }}   # <-- edit default
          nonempty_tables: ${{ vars.VERIFY_NONEMPTY_TABLES || '' }}

# Copy to <your-project>/.github/workflows/supabase-backup-daily.yml
name: Supabase Backup (daily)

on:
  schedule:
    - cron: "17 6 * * *"   # 06:17 UTC every day
  workflow_dispatch:        # allow manual runs

permissions:
  contents: read

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: alessonviana/supabase-backup-kit/backup@v1
        with:
          supabase_db_url: ${{ secrets.SUPABASE_DB_URL }}
          age_recipient:   ${{ vars.AGE_PUBLIC_KEY }}
          backup_prefix:   my-project      # <-- edit
          retention_days:  7

name: "Supabase encrypted backup"
description: "Dump a Supabase Postgres DB, compress, encrypt with age, and upload as an artifact."
author: "supabase-backup-kit"

inputs:
  supabase_db_url:
    description: "Pooler (session mode) connection string. SENSITIVE. Pass a secret."
    required: true
  age_recipient:
    description: "age public key(s) (age1...), one per line."
    required: true
  backup_prefix:
    description: "Artifact filename prefix, e.g. the project slug."
    required: true
  retention_days:
    description: "Artifact retention in days."
    required: false
    default: "7"
  supabase_cli_version:
    description: "Supabase CLI version to use."
    required: false
    default: "latest"
  # --- Optional off-site copy (S3-compatible). Leave s3_bucket empty to disable. ---
  s3_bucket:
    description: "S3-compatible bucket for an off-site copy. Empty = disabled."
    required: false
    default: ""
  s3_endpoint:
    description: "Custom S3 endpoint URL (B2/R2/Wasabi/MinIO). Empty = real AWS S3."
    required: false
    default: ""
  s3_region:
    description: "Region ('auto' for R2; real region for B2/S3)."
    required: false
    default: "auto"
  s3_prefix:
    description: "Key prefix inside the bucket, e.g. 'backups/'."
    required: false
    default: ""
  s3_access_key_id:
    description: "S3 access key id. SENSITIVE. Prefer a WRITE-ONLY key (no delete)."
    required: false
    default: ""
  s3_secret_access_key:
    description: "S3 secret access key. SENSITIVE. Pass a secret."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install age
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq age

    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: ${{ inputs.supabase_cli_version }}

    - name: Run backup
      id: backup
      shell: bash
      env:
        SUPABASE_DB_URL: ${{ inputs.supabase_db_url }}
        AGE_RECIPIENT: ${{ inputs.age_recipient }}
        BACKUP_PREFIX: ${{ inputs.backup_prefix }}
        OUTPUT_DIR: ${{ runner.temp }}/backup-out
      run: bash "$GITHUB_ACTION_PATH/../scripts/backup.sh"

    - name: Upload encrypted backup artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.backup.outputs.artifact_name }}
        path: ${{ steps.backup.outputs.artifact_path }}
        retention-days: ${{ inputs.retention_days }}
        if-no-files-found: error

    # Off-site copy: only runs when s3_bucket is set. The GitHub artifact above
    # is already secured before this step, so a misconfigured bucket fails loudly
    # without losing the primary copy.
    - name: Ensure AWS CLI (off-site upload)
      if: inputs.s3_bucket != ''
      shell: bash
      run: |
        if ! command -v aws >/dev/null; then
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q /tmp/awscliv2.zip -d /tmp
          sudo /tmp/aws/install
        fi
        aws --version

    - name: Upload off-site copy (S3-compatible)
      if: inputs.s3_bucket != ''
      shell: bash
      env:
        ARTIFACT_PATH: ${{ steps.backup.outputs.artifact_path }}
        S3_BUCKET: ${{ inputs.s3_bucket }}
        S3_ENDPOINT: ${{ inputs.s3_endpoint }}
        S3_REGION: ${{ inputs.s3_region }}
        S3_PREFIX: ${{ inputs.s3_prefix }}
        AWS_ACCESS_KEY_ID: ${{ inputs.s3_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.s3_secret_access_key }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/upload-s3.sh"

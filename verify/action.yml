name: "Supabase backup verify"
description: "Restore a backup into an ephemeral Postgres and assert expected tables exist."
author: "supabase-backup-kit"

inputs:
  backup_file:
    description: "Path to a *.sql.gz.age backup file on the runner."
    required: true
  age_identity:
    description: "age private key contents (AGE-SECRET-KEY-...). SENSITIVE. Pass a secret."
    required: true
  pg_url:
    description: "Connection string of a throwaway Postgres (e.g. a service container)."
    required: true
  expected_tables:
    description: "Space/comma separated public tables that MUST exist after restore."
    required: true
  nonempty_tables:
    description: "Optional subset that MUST have at least one row."
    required: false
    default: ""
  max_age_hours:
    description: "Fail if the newest backup is older than this many hours."
    required: false
    default: "48"

runs:
  using: "composite"
  steps:
    - name: Install age + postgresql-client
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq age postgresql-client

    - name: Run verify
      shell: bash
      env:
        BACKUP_FILE: ${{ inputs.backup_file }}
        AGE_IDENTITY: ${{ inputs.age_identity }}
        PG_URL: ${{ inputs.pg_url }}
        EXPECTED_TABLES: ${{ inputs.expected_tables }}
        NONEMPTY_TABLES: ${{ inputs.nonempty_tables }}
        MAX_AGE_HOURS: ${{ inputs.max_age_hours }}
      run: bash "$GITHUB_ACTION_PATH/../scripts/verify.sh"
